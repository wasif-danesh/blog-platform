name: CI (dev)

on:
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ 20, 22 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install pnpm first; then setup-node can enable pnpm cache safely
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # don't set "version" so it follows packageManager in package.json
          run_install: false

      - name: Use Node 22 (from .nvmrc if present)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install -w

      - name: Ensure web deps
        run: pnpm -C apps/web install

      # (optional) quick sanity
      - name: Check vitest presence
        run: pnpm -C apps/web exec vitest --version

      - name: Test (web)
        run: pnpm -C apps/web exec vitest run

      # --- Fast sanity checks -------------------------------------------------
      - name: Lint (web)
        run: pnpm -C apps/web lint || true

      - name: Test (web)
        run: pnpm -C apps/web test -- --run

      - name: Test (api)
        run: pnpm -C apps/api test

      # --- Build Storybook (packages/ui) -------------------------------------
      - name: Build Storybook (ui)
        if: ${{ !matrix.node || matrix.node == 22 }}
        run: pnpm --filter @ui/storybook build

      - name: Upload Storybook static
        if: ${{ !matrix.node || matrix.node == 22 }}
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static-${{ github.run_id }}
          path: packages/ui/storybook-static
          if-no-files-found: error
          retention-days: 7

      # --- Optional: Build Next.js for extra confidence ----------------------
      # Disable telemetry to keep logs clean
      - name: Build web (Next.js)
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm -C apps/web build
