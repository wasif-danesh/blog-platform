name: CI

on:
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ 20, 22 ]
    steps:
      - uses: actions/checkout@v4

      # Install pnpm based on `packageManager` in package.json
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # DO NOT set `version` here – it will detect from package.json
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'   # or node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install -w

      - name: Test web
        run: pnpm -C apps/web test -- --run

      - name: Test api
        run: pnpm -C apps/api test

      - name: Build Storybook
        run: pnpm --filter @ui/storybook build

      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/ui/storybook-static
